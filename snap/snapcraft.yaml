name: dolpai-player
base: core24
version: '1.0.0'
summary: Futuristic cyberpunk video player powered by VLC
description: |
  Dolpai Player is a premium, futuristic video player for Linux with a
  cyberpunk-inspired dark UI featuring neon cyan and blue glow accents.
  Built with Python, PyQt6, and the VLC media engine.

  FEATURES
  * Plays MP4, MKV, AVI, MOV, WebM, FLV, TS and many more formats
  * Drag and drop video and subtitle files onto the window
  * External subtitle support (.srt, .ass, .vtt) and embedded track toggling
  * Recent videos sidebar with right-click context menu
  * Fullscreen mode with 3-second auto-hiding controls
  * Full keyboard shortcut support
  * Animated splash screen with custom neon logo
  * Volume slider with mute toggle

grade: stable
confinement: strict
license: MIT

contact: https://github.com/Dolpaii/dolpai-player/issues
issues: https://github.com/Dolpaii/dolpai-player/issues
source-code: https://github.com/Dolpaii/dolpai-player
website: https://github.com/Dolpaii/dolpai-player

# gnome extension provides: desktop, wayland, x11, opengl, gsettings,
# gtk themes, icon themes, fonts — and sets QT_QPA_PLATFORM automatically
extensions: [gnome]

apps:
  dolpai-player:
    command: bin/launcher
    plugs:
      - home
      - removable-media
      - audio-playback
      - unity7
    environment:
      PYTHONPATH: $SNAP/usr/lib/python3/dist-packages
      VLC_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/vlc/plugins
      VLC_VERBOSE: "0"
      XDG_CONFIG_HOME: $SNAP_USER_COMMON/.config

parts:

  # ── 1. App source files ──────────────────────────────────────────────
  app:
    plugin: dump
    source: ../..
    source-type: local
    organize:
      main.py:    app/main.py
      version.py: app/version.py
      run.sh:     app/run.sh
      ui:         app/ui
      player:     app/player
      assets:     app/assets
    stage:
      - app/
    prime:
      - app/
    override-prime: |
      craftctl default
      find $CRAFT_PRIME/app -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      find $CRAFT_PRIME/app -name "*.pyc" -delete 2>/dev/null || true

  # ── 2. Launcher script ───────────────────────────────────────────────
  launcher:
    plugin: nil
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/bin
      cat > $CRAFT_PART_INSTALL/bin/launcher << 'EOF'
      #!/bin/bash
      export PYTHONPATH="$SNAP/usr/lib/python3/dist-packages"
      export VLC_PLUGIN_PATH="$SNAP/usr/lib/x86_64-linux-gnu/vlc/plugins"
      export VLC_VERBOSE=0
      export XDG_CONFIG_HOME="${SNAP_USER_COMMON}/.config"
      exec python3 "$SNAP/app/main.py" "$@"
      EOF
      chmod 755 $CRAFT_PART_INSTALL/bin/launcher
    stage:
      - bin/launcher
    prime:
      - bin/launcher

  # ── 3. Python runtime + PyQt6 + python-vlc ──────────────────────────
  python-deps:
    plugin: nil
    stage-packages:
      - python3
      - python3-pyqt6
      - python3-pyqt6.qtsvg
      - python3-vlc

  # ── 4. VLC engine + codecs ───────────────────────────────────────────
  vlc-engine:
    plugin: nil
    stage-packages:
      - vlc
      - vlc-bin
      - vlc-data
      - vlc-plugin-base
      - vlc-plugin-video-output
      - vlc-plugin-qt
      - libvlc5
      - libvlccore9
      - libavcodec62
      - libavcodec-extra
      - ffmpeg
      - libpulse0
      - libxcb1
      - libxcb-xinerama0
      - libxcb-cursor0
      - libx11-6

  # ── 5. Desktop integration ───────────────────────────────────────────
  desktop-integration:
    plugin: dump
    source: ../..
    source-type: local
    organize:
      dolpai-player.desktop: usr/share/applications/dolpai-player.desktop
      assets/icons/hicolor/256x256/apps/dolpai-player.png: usr/share/icons/hicolor/256x256/apps/dolpai-player.png
      assets/icons/hicolor/128x128/apps/dolpai-player.png: usr/share/icons/hicolor/128x128/apps/dolpai-player.png
      assets/icons/hicolor/64x64/apps/dolpai-player.png:   usr/share/icons/hicolor/64x64/apps/dolpai-player.png
      assets/icons/hicolor/48x48/apps/dolpai-player.png:   usr/share/icons/hicolor/48x48/apps/dolpai-player.png
      assets/icons/hicolor/scalable/apps/dolpai-player.svg: usr/share/icons/hicolor/scalable/apps/dolpai-player.svg
      packaging/appstream/io.github.dolpaii.dolpai_player.metainfo.xml: usr/share/metainfo/io.github.dolpaii.dolpai_player.metainfo.xml
    stage:
      - usr/share/applications/
      - usr/share/icons/
      - usr/share/metainfo/
    prime:
      - usr/share/applications/
      - usr/share/icons/
      - usr/share/metainfo/
