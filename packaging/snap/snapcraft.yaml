name: dolpai-player
base: core22
version: '1.0.0'
summary: Futuristic cyberpunk video player powered by VLC
description: |
  Dolpai Player is a premium, futuristic video player for Linux with a
  cyberpunk-inspired dark UI featuring neon cyan and blue glow accents.

  Built with Python, PyQt6, and the VLC media engine.

  Features:
  - Plays MP4, MKV, AVI, MOV, WebM, FLV, TS and many more formats
  - Drag and drop video and subtitle files
  - External subtitle support (.srt, .ass, .vtt)
  - Recent videos sidebar
  - Fullscreen with auto-hiding controls
  - Full keyboard shortcut support
  - Animated splash screen with custom logo

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  dolpai-player:
    command: bin/dolpai-player
    command-chain:
      - bin/desktop-launch
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - home
      - removable-media
      - audio-playback
      - hardware-observe
    environment:
      PYTHONPATH: $SNAP/lib/python3.10/site-packages:$SNAP/usr/lib/python3/dist-packages
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib

parts:
  # ── Desktop helpers (GTK theme, fonts, cursors) ──────────────────────
  desktop-gtk3:
    source: https://github.com/ubuntu/snapcraft-desktop-helpers.git
    source-subdir: gtk
    plugin: make
    make-parameters: [FLAVOR=gtk3]
    build-packages:
      - build-essential
      - libgtk-3-dev
    stage-packages:
      - libxkbcommon0
      - ttf-ubuntu-font-family
      - dmz-cursor-theme
      - light-themes
      - adwaita-icon-theme
      - gnome-themes-extra
      - shared-mime-info
      - libgtk-3-0
      - libgdk-pixbuf2.0-0
      - libglib2.0-bin
      - libgtk-3-bin
      - unity-gtk3-module
      - libappindicator3-1
      - locales-all
      - xdg-user-dirs
      - ibus-gtk3
      - libibus-1.0-5

  # ── VLC + system libs ────────────────────────────────────────────────
  vlc-libs:
    plugin: nil
    stage-packages:
      - vlc
      - libvlc-dev
      - libvlccore9
      - ffmpeg
      - libxcb-xinerama0
      - libxcb-cursor0
      - libxcb1
      - libx11-6

  # ── Python + PyQt6 ───────────────────────────────────────────────────
  python-deps:
    plugin: python
    python-packages:
      - PyQt6>=6.4.0
      - python-vlc>=3.0.18122
    build-packages:
      - python3-dev
      - python3-pip
    stage-packages:
      - python3
      - python3-pyqt6
      - python3-pyqt6.qtsvg
      - python3-vlc

  # ── Dolpai Player source ─────────────────────────────────────────────
  dolpai-player:
    plugin: dump
    source: ../..
    organize:
      main.py:    lib/dolpai-player/main.py
      version.py: lib/dolpai-player/version.py
      ui/:        lib/dolpai-player/ui/
      player/:    lib/dolpai-player/player/
      assets/:    lib/dolpai-player/assets/
    prime:
      - lib/dolpai-player/
      - dolpai-player.desktop

  # ── Launcher script ──────────────────────────────────────────────────
  launcher:
    plugin: dump
    source: snap/local/
    organize:
      dolpai-player: bin/dolpai-player
